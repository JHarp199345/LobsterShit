# SonarCloud - Structural analysis for code quality
# https://docs.sonarsource.com/sonarcloud/advanced-setup/ci-based-analysis/

sonar.projectKey=JHarp199345_LobsterShit
sonar.organization=jharp199345
sonar.host.url=https://sonarcloud.io

# ── Sources ──────────────────────────────────────────────────────────────────
sonar.sources=openclaw-core
sonar.tests=openclaw-core
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js

# ── Exclusions ───────────────────────────────────────────────────────────────
# Exclude all build artifacts, vendored code, and compiled outputs.
# The canonical source of truth is extensions/**/*.ts — not any compiled JS.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  openclaw-core/openclaw-core/**,\
  openclaw-core/assets/chrome-extension/**,\
  **/*.bundle.js,\
  **/*.min.js,\
  **/a2ui.bundle.js,\
  openclaw-core/skills/**,\
  openclaw-core/tests/**

# ── Coverage ─────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Language settings ────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=openclaw-core/extensions
