# SonarCloud - Structural analysis for code quality
# https://docs.sonarsource.com/sonarcloud/advanced-setup/ci-based-analysis/
#
# Required: Create a project at https://sonarcloud.io and add these to your env:
#   sonar.projectKey - e.g. JHarp199345_LobsterShit
#   sonar.organization - your SonarCloud org

sonar.projectKey=JHarp199345_LobsterShit
sonar.organization=jharp199345
sonar.host.url=https://sonarcloud.io

# Sources and exclusions
sonar.sources=openclaw-core
sonar.exclusions=**/node_modules/**,**/dist/**,**/report/**
sonar.tests=openclaw-core
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
