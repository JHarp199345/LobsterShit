name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Install pnpm FIRST
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Step 2: Setup Node.js and point to the specific lock file location
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          # This is the "silver bullet" to fix the lock file not found error
          cache-dependency-path: openclaw-core/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: openclaw-core

      - name: Build
        run: pnpm build
        working-directory: openclaw-core

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
