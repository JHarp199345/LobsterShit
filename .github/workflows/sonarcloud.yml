name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: openclaw-core

      # Tactical Fix: Force-copy the scripts to ensure they exist and are executable
      - name: Sync build scripts
        run: |
          mkdir -p openclaw-core/scripts
          cp -r scripts/* openclaw-core/scripts/
          chmod +x openclaw-core/scripts/*.sh

      - name: Build
        run: pnpm build
        working-directory: openclaw-core

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
