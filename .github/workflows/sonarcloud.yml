name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: openclaw-core

      # Tactical Fix: Force-sync using absolute workspace paths
      - name: Sync build scripts
        run: |
          SRC_DIR="${{ github.workspace }}/scripts"
          DEST_DIR="${{ github.workspace }}/openclaw-core/scripts"
          
          if [ -d "$SRC_DIR" ]; then
            mkdir -p "$DEST_DIR"
            cp -Rv "$SRC_DIR"/* "$DEST_DIR/"
            chmod +x "$DEST_DIR"/*.sh
            echo "Successfully synced scripts to $DEST_DIR"
          else
            echo "Error: Root scripts directory not found at $SRC_DIR"
            exit 1
          fi

      - name: Build
        run: pnpm build
        working-directory: openclaw-core

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
