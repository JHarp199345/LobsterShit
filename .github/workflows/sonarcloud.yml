name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Fixed: Project requires >=22.12.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: openclaw-core

      # Tactical Fix: Ensure the build scripts from the root are accessible in the subfolder
      - name: Link root scripts
        run: |
          if [ -d "../scripts" ] && [ ! -d "scripts" ]; then
            ln -s ../scripts scripts
          fi
        working-directory: openclaw-core

      - name: Build
        run: pnpm build
        working-directory: openclaw-core

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
